services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: drawpro
      POSTGRES_PASSWORD: drawpro
      POSTGRES_DB: drawpro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drawpro']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ../apps/api/.env
    environment:
      # Point to the postgres container in the Docker network
      DATABASE_URL: postgresql://drawpro:drawpro@postgres:5432/drawpro
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      FRONTEND_URL: http://localhost:3010
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  collab:
    build:
      context: ..
      dockerfile: apps/collab/Dockerfile
    restart: unless-stopped
    env_file: ../apps/collab/.env
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3001
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '3010:80'   # only exposed port
    depends_on:
      - api
      - collab

volumes:
  postgres_data:
  redis_data:
  minio_data:
